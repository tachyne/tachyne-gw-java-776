apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tachyne-gw-java-776
  namespace: tachyne
  labels:
    app.kubernetes.io/name: tachyne
    app.kubernetes.io/component: gw-java-776
    app.kubernetes.io/part-of: tachyne
spec:
  serviceName: tachyne-gw-java-776-hl
  replicas: 2 # front-tier HA: a rollout/crash no longer takes the gateway fully down
  selector:
    matchLabels:
      app.kubernetes.io/name: tachyne
      app.kubernetes.io/component: gw-java-776
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tachyne
        app.kubernetes.io/component: gw-java-776
        app.kubernetes.io/part-of: tachyne
    spec:
      containers:
        - name: gw
          image: github.com/tachyne/tachyne-gw-java-776:latest
          imagePullPolicy: Always
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TACHYNE_ACCESS_URL
              value: http://tachyne-access.tachyne.svc.cluster.local:8080
            - name: TACHYNE_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tachyne-access-token
                  key: token
            - name: TACHYNE_BACKEND # login pod (west shard)
              value: tachyne-world-0.tachyne-world-hl.tachyne.svc.cluster.local:25500
            - name: TACHYNE_WORLD_PATTERN # dial pattern for the destination shard on handover
              value: tachyne-world-%d.tachyne-world-hl.tachyne.svc.cluster.local:25500
            - name: TACHYNE_ATTACH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tachyne-attach-token
                  key: token
          ports:
            - containerPort: 25565
              name: minecraft
          readinessProbe:
            tcpSocket:
              port: minecraft
            initialDelaySeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: minecraft
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      imagePullSecrets:
        - name: forgejo-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
